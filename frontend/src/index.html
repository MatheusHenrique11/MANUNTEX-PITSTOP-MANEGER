<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Manutex PitStop Manager</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Security headers via meta (reforço — o principal fica no servidor) -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">

  <!-- CSP reforçada: bloqueia scripts inline e recursos externos não autorizados -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' http://localhost:8080; frame-ancestors 'none';">

  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <!-- Inter font para identidade visual -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 font-sans antialiased">
  <app-root></app-root>
</body>
</html>
