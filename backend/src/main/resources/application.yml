spring:
  application:
    name: pitstop-backend

  # ───────────────────────── DATASOURCE ─────────────────────────
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/pitstop}
    username: ${DB_USER:pitstop}
    password: ${DB_PASS:pitstop_secret}
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway gerencia o schema; Hibernate só valida
    open-in-view: false           # evita lazy-loading silencioso em controllers
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        default_schema: public

  # ───────────────────────── FLYWAY ─────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ───────────────────────── SERVLET / MULTIPART ────────────────
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 12MB

  # ───────────────────────── CACHE (Caffeine) ───────────────────
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=300s

# ─────────────────────────── JWT ──────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET}                  # min. 512 bits (64 chars) — obrigatório via env
    access-token-expiry-ms: 900000         # 15 min
    refresh-token-expiry-ms: 604800000     # 7 dias
    issuer: pitstop.manutex.com

  # ─────────────────── ARMAZENAMENTO S3 / MinIO ─────────────────
  storage:
    endpoint: ${STORAGE_ENDPOINT:http://localhost:9000}    # MinIO local; remova em produção (usa AWS)
    bucket: ${STORAGE_BUCKET:pitstop-docs}
    region: ${AWS_REGION:us-east-1}
    presigned-url-expiry-minutes: 5        # URLs expiram em 5 minutos
    # Criptografia SSE-S3 ativada no bucket — ver StorageConfig.java

  # ─────────────────── RATE LIMITING ────────────────────────────
  rate-limit:
    capacity: 60                           # tokens por janela
    refill-tokens: 60
    refill-duration-seconds: 60

  # ─────────────────── CORS ─────────────────────────────────────
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# ─────────────────────────── ACTUATOR ─────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized

# ─────────────────────────── TOGGLZ ───────────────────────────
togglz:
  enabled: true
  feature-enums: com.manutex.pitstop.config.AppFeatures
  console:
    enabled: true
    path: /admin/toggles
    secured: true

# ─────────────────────────── LOGGING ──────────────────────────
logging:
  level:
    root: WARN
    com.manutex.pitstop: INFO
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
