spring:
  application:
    name: pitstop-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:pitstop}}
    username: ${DB_USER:${PGUSER:pitstop}}
    password: ${DB_PASS:${PGPASSWORD:pitstop_secret}}
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 12MB

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=300s

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiry-ms: 900000
    refresh-token-expiry-ms: 604800000
    issuer: pitstop.manutex.com

  storage:
    endpoint: ${STORAGE_ENDPOINT:}
    bucket: ${STORAGE_BUCKET:pitstop-docs}
    region: ${AWS_REGION:us-east-1}
    presigned-url-expiry-minutes: 5

  rate-limit:
    capacity: 60
    refill-tokens: 60
    refill-duration-seconds: 60

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized

togglz:
  enabled: true
  feature-enums: com.manutex.pitstop.config.AppFeatures
  console:
    enabled: true
    path: /admin/toggles
    secured: true

logging:
  level:
    root: WARN
    com.manutex.pitstop: INFO
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
